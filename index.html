<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clock Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=DM+Sans:wght@200;300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: transparent;
      --surface: #f5ede9;
      --ink: #1a1a18;
      --ink-muted: #9a8880;
      --accent: #B59259;
      --accent-light: rgba(181,146,89,0.12);
      --border: rgba(0,0,0,0.08);
      --divider: rgba(0,0,0,0.06);
      --radius: 16px;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      padding: 0;
    }
    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px 16px;
      text-align: center;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ── Clock ── */
    .time {
      font-family: 'DM Serif Display', serif;
      font-size: 60px;
      font-weight: 300;
      color: #4a4a46;
      line-height: 1;
      margin-bottom: 4px;
    }
    .time .colon {
      display: inline-block;
      animation: blink 1s step-start infinite;
      color: var(--accent);
      font-size: 36px;
      vertical-align: middle;
      position: relative;
      top: -8px;
      margin: 0 2px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--divider);
      margin: 12px 0 11px;
    }

    /* ── Calendar info row ── */
    .cal-row {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 0;
    }
    .cal-cell {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 0 8px;
    }
    .cal-cell + .cal-cell {
      border-left: 1px solid var(--divider);
    }
    .cal-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .cal-value {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--ink);
      line-height: 1;
    }
    .cal-value.accent {
      color: var(--accent);
    }

    /* ── Day pill ── */
    .day-pill {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-light);
      border-radius: 20px;
      padding: 2px 10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="widget">

    <div class="day-pill" id="day-pill">Wednesday</div>

    <div class="time">
      <span id="hh">12</span><span class="colon">:</span><span id="mm">00</span>
    </div>

    <div class="divider"></div>

    <div class="cal-row">
      <div class="cal-cell">
        <span class="cal-label">Date</span>
        <span class="cal-value" id="cal-date">—</span>
      </div>
      <div class="cal-cell">
        <span class="cal-label">Month</span>
        <span class="cal-value" id="cal-month">—</span>
      </div>
      <div class="cal-cell">
        <span class="cal-label">Week</span>
        <span class="cal-value accent" id="cal-week">—</span>
      </div>
    </div>

  </div>
  <script>
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function getWeekNumber(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dayNum = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    }

    function tick() {
      const now = new Date();
      document.getElementById('hh').textContent        = pad(now.getHours());
      document.getElementById('mm').textContent        = pad(now.getMinutes());
      document.getElementById('day-pill').textContent  = DAYS[now.getDay()];
      document.getElementById('cal-date').textContent  = now.getDate();
      document.getElementById('cal-month').textContent = MONTHS[now.getMonth()];
      document.getElementById('cal-week').textContent  = 'w' + getWeekNumber(now);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
