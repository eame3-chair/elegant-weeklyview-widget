<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Week Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&family=DM+Sans:wght@200;300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: transparent;
      --surface: #f5ede9;
      --ink: #1a1a18;
      --ink-muted: #9a8880;
      --accent: #B59259;
      --accent-light: rgba(181,146,89,0.12);
      --border: rgba(0,0,0,0.08);
      --divider: rgba(0,0,0,0.06);
      --radius: 16px;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }

    .widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px 10px;
      width: 100%;
      position: relative;
    }

    .week-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0;
    }

    .month-year {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding-left: 9px;
    }

    .month {
      font-family: 'DM Serif Display', serif;
      font-size: 18.5px;
      font-weight: 400;
      color: #47403a;
      letter-spacing: -0.01em;
    }

    .year {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--ink-muted);
    }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-right: -6px;
      padding-right: 9px;
    }

    .week-num {
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px;
      font-weight: 300;
      color: var(--ink-muted);
    }

    .week-num span {
      color: var(--accent);
      font-weight: 400;
    }

    .nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      font-size: 15px;
      padding: 2px 5px;
      border-radius: 6px;
      transition: background 0.15s;
      line-height: 1;
    }

    .nav-btn:hover { background: var(--accent-light); }

    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      position: relative;
    }

    .day-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .day-name.is-today { color: var(--accent); }

    .day-num {
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 300;
      color: var(--ink);
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .day-num.is-today {
      background: var(--accent);
      color: #ffffff;
      font-weight: 600;
    }

    .day-num.is-weekend { color: var(--ink-muted); }
    .day-num.is-past    { opacity: 0.35; }

    .week-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }

    .back-to-today {
      display: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.06em;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .back-to-today:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="day-name" style="text-align:center; margin-bottom: 10.3px; letter-spacing: 0.06em;">Current Date</div>
    <div style="width:100%; height:1px; background:rgba(0,0,0,0.06); margin-bottom: 10.3px;"></div>
    <div class="week-header">
      <div class="month-year">
        <span class="month" id="month"></span>
        <span class="year" id="year"></span>
      </div>
      <div class="nav-controls">
        <button class="nav-btn" id="prev-btn">&#8592;</button>
        <div class="week-num">Week <span id="week-num"></span></div>
        <button class="nav-btn" id="next-btn">&#8594;</button>
      </div>
    </div>

    <div class="week-row" id="week-row"></div>

    <div class="week-footer">
      <button class="back-to-today" id="back-to-today">↩ Back to today</button>
    </div>
  </div>

  <script>
    const DAY_NAMES    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS       = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function getWeekNumber(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    }

    const today = new Date();
    today.setHours(0,0,0,0);

    let weekStart = new Date(today);
    weekStart.setDate(today.getDate() - today.getDay());

    function buildWeek() {
      const weekRow = document.getElementById('week-row');
      weekRow.innerHTML = '';

      for (let i = 0; i < 7; i++) {
        const d = new Date(weekStart);
        d.setDate(weekStart.getDate() + i);

        const isToday   = d.toDateString() === today.toDateString();
        const isPast    = d < today;
        const isWeekend = i === 0 || i === 6;

        const col  = document.createElement('div');
        col.className = 'day-col';

        const name = document.createElement('div');
        name.className   = 'day-name' + (isToday ? ' is-today' : '');
        name.textContent = DAY_NAMES[i];

        const num = document.createElement('div');
        let cls = 'day-num';
        if (isToday)               cls += ' is-today';
        if (isPast && !isToday)    cls += ' is-past';
        if (isWeekend && !isToday) cls += ' is-weekend';
        num.className   = cls;
        num.textContent = d.getDate();

        col.appendChild(name);
        col.appendChild(num);
        weekRow.appendChild(col);
      }

      const midWeek = new Date(weekStart);
      midWeek.setDate(weekStart.getDate() + 3);

      document.getElementById('month').textContent    = MONTHS[midWeek.getMonth()];
      document.getElementById('year').textContent     = midWeek.getFullYear();
      document.getElementById('week-num').textContent = getWeekNumber(midWeek);

      const todayWeekStart = new Date(today);
      todayWeekStart.setDate(today.getDate() - today.getDay());
      const isCurrentWeek = weekStart.toDateString() === todayWeekStart.toDateString();
      document.getElementById('back-to-today').style.display = isCurrentWeek ? 'none' : 'inline';
    }

    document.getElementById('prev-btn').addEventListener('click', () => {
      weekStart.setDate(weekStart.getDate() - 7);
      buildWeek();
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      weekStart.setDate(weekStart.getDate() + 7);
      buildWeek();
    });

    document.getElementById('back-to-today').addEventListener('click', () => {
      weekStart = new Date(today);
      weekStart.setDate(today.getDate() - today.getDay());
      buildWeek();
    });

    buildWeek();
  </script>
</body>
</html>
